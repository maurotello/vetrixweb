<!DOCTYPE html>
<html lang="es-ES">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>404 - Página no encontrada | VetrixWeb</title>
    <meta name="description"
        content="La página que buscas no existe o ha sido movida. Vuelve al inicio para seguir explorando nuestros servicios." />
    <meta name="robots" content="noindex, follow" />

    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <link rel="apple-touch-icon" href="/assets/img/favicon.svg" />
    <link rel="stylesheet" href="/assets/css/main.v2.min.css">

    <style>
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 400 900;
            font-display: optional;
            src: url('https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2020, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        :root {
            --neon-green: #00f2b4;
            --bg-dark: #05070a;
            --slate-400: #94a3b8;
            --slate-300: #cbd5e1;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--slate-300);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .error-number {
            font-size: clamp(8.5rem, 28vw, 22rem);
            line-height: 0.8;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom, #00f2b4, #008f6a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 35px rgba(0, 242, 180, 0.45));
            margin: 2rem 0;
        }

        .badge-premium {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1.25rem;
            background: rgba(0, 242, 180, 0.08);
            border: 1px solid rgba(0, 242, 180, 0.2);
            border-radius: 9999px;
            color: var(--neon-green);
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            backdrop-filter: blur(8px);
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            position: relative;
        }

        .badge-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background-color: var(--neon-green);
            opacity: 0.4;
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {

            75%,
            100% {
                transform: scale(2.8);
                opacity: 0;
            }
        }

        .btn-premium-primary {
            background: var(--neon-green);
            color: #05070a;
            font-weight: 700;
            font-size: 1rem;
            padding: 1rem 2.5rem;
            border-radius: 1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 0 25px rgba(0, 242, 180, 0.4);
        }

        .btn-premium-primary:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 0 45px rgba(0, 242, 180, 0.6);
            background: #fff;
        }

        .btn-premium-secondary {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            font-weight: 800;
            font-size: 1rem;
            padding: 1.25rem 2.5rem;
            border-radius: 1.25rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            backdrop-filter: blur(10px);
        }

        .btn-premium-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 242, 180, 0.5);
            transform: translateY(-3px);
        }

        .floating-whatsapp-trigger {
            position: fixed;
            bottom: 2.5rem;
            right: 2.5rem;
            z-index: 999;
            background: #25D366;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 35px rgba(37, 211, 102, 0.45);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float-wa 4s ease-in-out infinite;
        }

        .floating-whatsapp-trigger:hover {
            transform: scale(1.18) rotate(15deg);
            box-shadow: 0 15px 45px rgba(37, 211, 102, 0.65);
        }

        @keyframes float-wa {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .description-focused {
            font-size: 1.35rem;
            line-height: 1.6;
            color: var(--slate-400);
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .description-focused {
                max-width: 100%;
                font-size: 1.15rem;
            }
        }
    </style>
</head>

<body class="bg-[#05070a] text-slate-300 font-display selection:bg-neon-cyan/20 overflow-x-hidden">

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- MAIN -->
    <main
        class="relative min-h-[85vh] flex flex-col items-center justify-center px-6 py-20 bg-[#05070a] overflow-hidden">
        <div class="absolute inset-0 pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-[600px] h-[600px] bg-blue-600/5 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-[#00f2b4]/5 blur-[120px] rounded-full">
            </div>
        </div>

        <div class="relative z-10 text-center max-w-4xl mx-auto">
            <div class="badge-premium mb-10">
                <span class="badge-dot"></span>
                <span id="badge-text">Protocolo 404 Activado</span>
            </div>

            <div class="error-number">404</div>

            <div class="mt-4 mb-14 space-y-8">
                <h1 id="titulo-404" class="text-5xl md:text-7xl font-black text-white tracking-tight">
                    Página no encontrada
                </h1>
                <p id="descripcion-404" class="description-focused">
                    La URL que ingresaste no existe o ha sido movida. No te preocupes, desde acá podés volver al inicio
                    o contactarnos directamente.
                </p>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-6 mt-8">
                <a id="btn-home" href="/" class="btn-premium-primary">Volver al inicio</a>
                <a id="btn-contacto" href="https://wa.me/542920538998" target="_blank"
                    class="btn-premium-secondary">Hablar con un experto</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="/assets/js/layout.js"></script>
    <script>
        document.addEventListener('layoutReady', () => {
            const langDetect = document.documentElement.lang.split('-')[0];
            const i18n_405 = {
                es: {
                    badge: 'Protocolo 405 Activado',
                    titulo: 'Método no permitido',
                    descripcion: 'Esta acción no está permitida. Vuelve al inicio o contacta con nosotros.'
                },
                en: {
                    badge: '405 Protocol Activated',
                    titulo: 'Method Not Allowed',
                    descripcion: 'This action is not allowed. Please return to the homepage or contact us.'
                },
                pt: {
                    badge: 'Protocolo 405 Ativado',
                    titulo: 'Método não permitido',
                    descripcion: 'Esta ação não é permitida. Volte ao início ou entre em contato conosco.'
                }
            };
            const currentT = i18n_405[langDetect] || i18n_405.es;
            document.getElementById('badge-text').textContent = currentT.badge;
            document.getElementById('titulo-404').textContent = currentT.titulo;
            document.getElementById('descripcion-404').textContent = currentT.descripcion;
            document.querySelector('.error-number').textContent = '405';
        });
    </script>

</body>

</html>
