<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Firma de Correo Electrónico</title>
</head>

<body style="padding: 40px; background-color: #f8fafc; font-family: sans-serif;">

    <!-- INICIO DE LA FIRMA (COPIAR ESTO) -->
    <div style="background-color: #ffffff; display: inline-block; padding: 20px; border: 1px dashed #cbd5e1;">

        <table cellpadding="0" cellspacing="0" border="0"
            style="font-family: Arial, sans-serif; max-width: 600px; background-color: transparent;">
            <tr>
                <!-- Columna 1: Logo Cuadrado (Perfil) -->
                <td style="padding-right: 20px; border-right: 2px solid #00f2b4; vertical-align: middle;">
                    <!-- Se utiliza una ruta absoluta asumiendo que el dominio es vetrixweb.com. Si envías correos, la imagen debe estar en la red (internet) para que se visualice. -->
                    <img src="https://vetrixweb.com/assets/img/logo-firma.png" alt="VetrixWeb Logo" width="80"
                        height="80" style="display: block; width: 80px; height: 80px; border-radius: 12px;">
                </td>

                <!-- Columna 2: Datos de Contacto -->
                <td style="padding-left: 20px; vertical-align: middle;">
                    <!-- Nombre / Empresa -->
                    <h2
                        style="margin: 0; padding: 0; font-size: 20px; color: #05070a; letter-spacing: -0.5px; text-transform: uppercase;">
                        Vetrix<span style="color: #00f2b4;">Web</span></h2>

                    <!-- Slogan / Especialidad -->
                    <p
                        style="margin: 3px 0 12px 0; padding: 0; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold;">
                        Infraestructura de Alto Rendimiento</p>

                    <!-- Lineas de Contacto -->
                    <table cellpadding="0" cellspacing="0" border="0" style="font-size: 13px; color: #334155;">
                        <!-- Teléfono -->
                        <tr>
                            <td width="20" style="padding-bottom: 6px;">
                                <img src="https://img.icons8.com/color/48/00f2b4/phone.png" width="14" height="14"
                                    style="display: block;" alt="Tel">
                            </td>
                            <td style="padding-bottom: 6px; font-family: Arial, sans-serif;">
                                <a href="tel:+542920538998" style="color: #334155; text-decoration: none;">+54 2920
                                    538998</a>
                            </td>
                        </tr>
                        <!-- Email -->
                        <tr>
                            <td width="20" style="padding-bottom: 6px;">
                                <img src="https://img.icons8.com/color/48/00f2b4/secured-letter--v1.png" width="14"
                                    height="14" style="display: block;" alt="Email">
                            </td>
                            <td style="padding-bottom: 6px; font-family: Arial, sans-serif;">
                                <a href="mailto:info@vetrixweb.com"
                                    style="color: #334155; text-decoration: none;">info@vetrixweb.com</a>
                            </td>
                        </tr>
                        <!-- Web -->
                        <tr>
                            <td width="20">
                                <img src="https://img.icons8.com/color/48/00f2b4/domain--v1.png" width="14" height="14"
                                    style="display: block;" alt="Web">
                            </td>
                            <td style="font-family: Arial, sans-serif;">
                                <a href="https://vetrixweb.com"
                                    style="color: #334155; text-decoration: none;">vetrixweb.com</a>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>

    </div>
    <!-- FIN DE LA FIRMA -->

</body>

</html>
