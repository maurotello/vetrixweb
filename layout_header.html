<header id="main-header-element"

    <div class="flex items-center gap-4">
        <div class="hidden md:block relative group">

                    stroke="#00f2b4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    class="transition-transform group-hover:rotate-12">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />

                <a href="javascript:void(0)" onclick="window.changeLanguage('es')"

                <a href="javascript:void(0)" onclick="window.changeLanguage('en')"

        <button id="mobile-menu-btn" class="md:hidden text-white focus:outline-none flex items-center justify-center">
